<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer Clock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="themeBtn" class="theme-btn">🌙 Melancholy Mode</button>
    </div>
    
    <div class="container">
        <h1>⏱️ Avi's Yud Zayin B'Tamuz Fast Countdown</h1>
        <p class="subtitle">Fast ends at nightfall in Jerusalem</p>
        <div class="timer-display">
            <div class="fast-info">
                <p id="endTime" class="end-time"></p>
            </div>
            <div class="time">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
        </div>
        <div class="status" id="status"></div>
        <div class="controls">
            <button id="resetBtn" class="btn btn-reset">Reset Timer</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
